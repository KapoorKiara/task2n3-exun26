</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <div class="nav-logo"><a href="index.html">Aether</a></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

<div class="mobile-menu" id="mob">
  <a href="index.html">Home</a>
  <a href="tech.html">Tech News</a>
  <a href="contact.html">Contact</a>
  <a href="waitlist.html">Join Waitlist</a>
</div>

<div class="contact-split">
  <div class="contact-left">
    <h1>Let's build<br />the <span>future.</span></h1>
    <p style="color:rgba(255,255,255,0.55); font-size:0.95rem; line-height:1.7; max-width:360px;">Our team responds within 24 hours. <br> MUAHAHAHAHAHA. </br> </p>

  </div>

  <div class="contact-right">
    <h2>Send a message</h2>
    <form id="contactForm" onsubmit="submitContact(event)">
      <div class="field" id="f-name">
        <input type="text" id="c-name" placeholder=" " required />
        <label for="c-name">Full Name</label>
      </div>
      <div class="field" id="f-email">
        <input type="email" id="c-email" placeholder=" " required />
        <label for="c-email">Email Address</label>
      </div>
      <div class="field" id="f-msg">
        <textarea id="c-msg" placeholder=" " rows="4" required></textarea>
        <label for="c-msg">Message</label>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>

</div>

<script>
 function submitContact(e) {
    e.preventDefault(); 
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const msg = document.getElementById('c-msg').value.trim();

    alert('Message received!\n\nName: ' + name + '\nEmail: ' + email + '\nMessage: ' + msg);
    document.getElementById('contactForm').reset();
  }
</script>
</body>
</html>
